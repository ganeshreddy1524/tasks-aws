AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Simple Lambda function triggered by S3 uploads

Parameters:
  BucketName:
    Type: String
    Default: lambda-s3-demo-bucket-127246139738
    Description: Name of the S3 bucket

Resources:
  # S3 Bucket
  DemoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt S3ProcessorFunction.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/

  # Lambda Function
  S3ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: s3-file-processor
      Handler: index.handler
      Runtime: nodejs20.x
      CodeUri: .
      MemorySize: 256
      Timeout: 30
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref BucketName
        - S3WritePolicy:
            BucketName: !Ref BucketName

  # Permission for S3 to invoke Lambda
  S3InvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref S3ProcessorFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub arn:aws:s3:::${BucketName}

Outputs:
  BucketName:
    Description: S3 Bucket Name
    Value: !Ref DemoBucket
  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt S3ProcessorFunction.Arn
